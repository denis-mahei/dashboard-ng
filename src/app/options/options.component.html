<div style="margin-bottom: 24px">
  <button mat-raised-button (click)="onLeaveFeedback.emit('good')">Good</button>
  <button mat-raised-button (click)="onLeaveFeedback.emit('neutral')">
    Neutral
  </button>
  <button mat-raised-button (click)="onLeaveFeedback.emit('bad')">Bad</button>
  <button mat-raised-button (click)="onResetFeedback.emit()">Reset</button>
</div>
